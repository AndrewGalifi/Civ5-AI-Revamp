name: Civ5 Build

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: civ5-local-runner
  cancel-in-progress: false

jobs:
  build:
    name: Build DLL
    runs-on: [self-hosted, Windows, civ5]
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Build DLL
        shell: cmd
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File scripts\civ5_dll.ps1

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v7
        with:
          name: CvGameCoreDLL_Expansion2Win32Mod
          path: CvGameCoreSource/BuildOutput/VS2013_ModWin32/CvGameCoreDLL_Expansion2Win32Mod.dll
          if-no-files-found: error
